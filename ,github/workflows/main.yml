name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Get the latest tag
        run: |
          git fetch --tags
          latest_tag=$(git describe --tags | tail -n +1)
          tag_commitid=$(echo $latest_tag | sed 's/\([^-]*\)-\([^-]*\)-g\([^-]*\)/\1-\3/')
          echo "TAG_COMMITID=${tag_commitid}" >> $GITHUB_ENV

      - name: Log in to AWS ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 590183814629.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t backend .

      - name: Tag Docker image
        run: docker tag backend:latest 590183814629.dkr.ecr.ap-south-1.amazonaws.com/backend:${{ env.TAG_COMMITID }}

      - name: Push Docker image to ECR
        run: docker push 590183814629.dkr.ecr.ap-south-1.amazonaws.com/backend:${{ env.TAG_COMMITID }}
